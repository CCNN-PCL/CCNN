  server {
    listen       80;
    server_name  localhost;


    # 根路径 - 静态文件
    location / {
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
    } 
    location /api/v1/chat/ws {
      proxy_pass http://user-agent.cybertwin.svc.cluster.local:5050/api/v1/chat/ws;
      # WebSocket 代理核心配置
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      # 其他优化配置
      proxy_read_timeout 60;
      proxy_send_timeout 60;
      proxy_connect_timeout 60;
    }
    location /api/v1/chat/send {
      proxy_http_version 1.1;
      proxy_pass http://user-agent.cybertwin.svc.cluster.local:5050/api/v1/chat/send;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/me {
      proxy_pass http://user-agent.cybertwin.svc.cluster.local:5050/api/me;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
location /api/register {
        proxy_http_version 1.1;
        proxy_pass http://cybertwin-backend.cybertwin.svc.cluster.local:5000/api/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
location /api/login {
        proxy_http_version 1.1;
        proxy_pass http://cybertwin-backend.cybertwin.svc.cluster.local:5000/api/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # API 代理
    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://cybertwin-backend.cybertwin.svc.cluster.local:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    
  location /login {
      proxy_http_version 1.1;
      proxy_pass http://user-agent.cybertwin.svc.cluster.local:5050/login;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /logout {
      proxy_http_version 1.1;
      proxy_pass http://user-agent.cybertwin.svc.cluster.local:5050/logout;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /medical_frontend/ {
    proxy_http_version 1.1;
    proxy_pass http://medical-frontend.medical-agent.svc.cluster.local:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

