version: '3.8'

services:
  medical-materials-mcp-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-0.1.0}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    image: medical-materials-mcp-service:${VERSION:-latest}
    container_name: medical-materials-mcp-service
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs
      - ./conf:/app/conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - medical-network

  # 如果需要数据库，可以在这里添加
  # mysql:
  #   image: mysql:8.0
  #   container_name: medical-mysql
  #   environment:
  #     MYSQL_ROOT_PASSWORD: pcnl2025
  #     MYSQL_DATABASE: medical_sh
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   networks:
  #     - medical-network

networks:
  medical-network:
    driver: bridge

volumes:
  mysql-data:
