version: '3.8'

services:
  medical-materials-mcp-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    image: medical-materials-mcp-service:dev
    container_name: medical-materials-mcp-service-dev
    ports:
      - "8080:8080"
      - "2345:2345"  # Delve debug port
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=debug
      - DEBUG=true
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./conf:/app/conf:ro
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: air -c .air.toml
    restart: unless-stopped
    networks:
      - medical-network-dev

networks:
  medical-network-dev:
    driver: bridge

volumes:
  go-mod-cache:
  go-build-cache:
