# -*- coding: utf-8 -*-
"""
第三方应用交互Docker Compose配置
==============================

提供完整的Docker Compose配置，支持：
1. 当前应用（主应用）- 使用云MySQL数据库
2. 数据代理应用（第三方应用1）- 使用Docker MySQL
3. 数据库存储服务（第三方应用2）- 使用Docker MySQL
4. 相关数据库和缓存服务

功能特性：
1. 独立部署：三个应用可以独立部署和扩展
2. 网络隔离：应用间通过Docker网络通信
3. 环境配置：支持环境变量配置
4. 数据持久化：支持数据卷挂载
5. 健康检查：内置健康检查机制

数据库说明：
- 主应用：使用云MySQL（192.168.208.66:31717），不依赖Docker MySQL
- 第三方应用：使用Docker MySQL（端口3307，避免与云MySQL冲突）

更新说明：
- 2025-12-02: 已从PostgreSQL迁移到MySQL
- PostgreSQL服务已注释，MySQL服务已添加

作者: QSIR
版本: 2.0 (MySQL版本)
"""

version: '3.8'

services:
  # 主应用服务
  main-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # 第三方应用配置
      - THIRD_PARTY_MODE=simulation
      - THIRD_PARTY_ENABLE=true
      - DATA_PROXY_APP_URL=http://data-proxy-app:9000
      - DATABASE_STORAGE_URL=http://database-storage:8000
      - THIRD_PARTY_BASE_URL=http://localhost:8000
      - THIRD_PARTY_API_TOKEN=internal_api_token_for_testing
      # 主应用数据库配置 - 使用云MySQL（不依赖Docker MySQL）
      - DATABASE_TYPE=mysql
      - MYSQL_HOST=192.168.208.66
      - MYSQL_PORT=31717
      - MYSQL_DATABASE=private_doctor_db
      - MYSQL_USER=doctor_user
      - MYSQL_PASSWORD=doctor_password
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      # 注意：主应用不依赖Docker MySQL，使用云MySQL
      # 第三方应用依赖Docker MySQL
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 数据代理应用（第三方应用1）
  data-proxy-app:
    build:
      context: ./data_proxy_app
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - APP_NAME=数据代理应用
      - APP_VERSION=1.0.0
      - LOG_LEVEL=INFO
      # 已迁移到MySQL - 第三方应用使用MySQL数据库
      - DATABASE_URL=mysql://mysql_user:mysql_password@mysql:3306/data_proxy_db?charset=utf8mb4
    volumes:
      - ./data_proxy_app/data:/app/data
      - ./data_proxy_app/logs:/app/logs
    depends_on:
      - mysql
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/v1/data-proxy/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 数据库存储服务（第三方应用2）
  database-storage:
    build:
      context: ./database_storage_service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - APP_NAME=数据库存储服务
      - APP_VERSION=1.0.0
      - LOG_LEVEL=INFO
      # 已迁移到MySQL - 第三方应用使用MySQL数据库
      - DATABASE_URL=mysql://mysql_user:mysql_password@mysql:3306/storage_db?charset=utf8mb4
    volumes:
      - ./database_storage_service/data:/app/data
      - ./database_storage_service/logs:/app/logs
    depends_on:
      - mysql
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/storage/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL数据库（用于第三方应用）
  # 注意：主应用使用云MySQL（192.168.208.66:31717），不依赖此Docker MySQL
  mysql:
    image: mysql:8.0
    container_name: third_party_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=mysql_root_password
      - MYSQL_DATABASE=medical_db
      - MYSQL_USER=mysql_user
      - MYSQL_PASSWORD=mysql_password
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    ports:
      - "3307:3306"  # 使用3307避免与云MySQL端口冲突
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - medical-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mysql_user", "-pmysql_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgreSQL数据库已注释 - 已迁移到MySQL
  # postgres:
  #   image: postgres:15
  #   environment:
  #     - POSTGRES_DB=medical_db
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./scripts/init_postgresql.sql:/docker-entrypoint-initdb.d/init.sql
  #   networks:
  #     - medical-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - main-app
      - data-proxy-app
      - database-storage
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 监控服务（可选）
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - medical-network

  # 日志收集服务（可选）
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - medical-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - medical-network

volumes:
  # postgres_data:  # PostgreSQL volume已注释 - 已迁移到MySQL
  mysql_data:      # MySQL数据卷（用于第三方应用）
  redis_data:
  prometheus_data:
  elasticsearch_data:

networks:
  medical-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
