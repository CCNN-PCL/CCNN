  #     POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./scripts/init_postgresql.sql:/docker-entrypoint-initdb.d/init.sql
  #   networks:
