  #     timeout: 10s
  #     retries: 3

  redis:
    image: redis:7-alpine
    container_name: private_doctor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doctor_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: private_doctor_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - doctor_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  # postgres_data:  # PostgreSQL volume已注释
  #   driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  doctor_network:
    driver: bridge
